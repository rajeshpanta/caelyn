name: Mavie
options:
  # Bundle ID prefix — needs to be unique to your Apple Developer team.
  # If you're on a paid Apple Developer Program, you can use your own
  # reverse-domain (e.g. com.yourdomain).
  bundleIdPrefix: com.smile
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""

targets:
  Mavie:
    type: application
    platform: iOS
    sources:
      - path: Mavie
    # HealthKit capability disabled by default because it requires:
    #   1. A paid Apple Developer Program membership ($99/year)
    #   2. The App ID registered in developer.apple.com with HealthKit enabled
    #   3. A provisioning profile that includes the HealthKit entitlement
    # When you're ready, uncomment the `entitlements:` block below and
    # uncomment the two NSHealth* INFOPLIST keys further down. The
    # HealthKit code in Services/ stays in place either way.
    #
    # entitlements:
    #   path: Mavie/Mavie.entitlements
    #   properties:
    #     com.apple.developer.healthkit: true
    #     com.apple.developer.healthkit.access: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smile.Mavie
        DEVELOPMENT_ASSET_PATHS: '"Mavie/Preview Content"'
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Mavie uses Face ID to keep your cycle data private."
        # HealthKit usage strings — uncomment when re-enabling HealthKit:
        # INFOPLIST_KEY_NSHealthShareUsageDescription: "Mavie reads your menstrual flow and symptoms from Apple Health to keep your cycle data in sync."
        # INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Mavie writes your menstrual flow and symptoms to Apple Health when you choose to."
        SWIFT_EMIT_LOC_STRINGS: YES

  MavieTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MavieTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smile.MavieTests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Mavie.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Mavie"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Mavie

  MavieUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MavieUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smile.MavieUITests
        TEST_TARGET_NAME: Mavie
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Mavie

schemes:
  Mavie:
    build:
      targets:
        Mavie: all
        MavieTests: [test]
        MavieUITests: [test]
    test:
      config: Debug
      targets:
        - MavieTests
        - MavieUITests
    run:
      config: Debug
      # The .storekit lives at the project root, OUTSIDE the source path,
      # so it is NOT bundled into Release/TestFlight builds. It is used only
      # when running locally from Xcode against the Simulator. Release and
      # TestFlight always talk to real App Store / Sandbox StoreKit.
      storeKitConfiguration: Mavie.storekit
    archive:
      config: Release
