name: Caelyn
options:
  # Bundle ID prefix — needs to be unique to your Apple Developer team.
  # If you're on a paid Apple Developer Program, you can use your own
  # reverse-domain (e.g. com.yourdomain).
  bundleIdPrefix: smallpanta-icould.com
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: 3
    DEVELOPMENT_TEAM: "7T9897GFKH"

targets:
  Caelyn:
    type: application
    platform: iOS
    sources:
      - path: Caelyn
    # ────────────────────────────────────────────────────────────────────
    # App Group — required for WidgetKit data sharing.
    # Register group.smallpanta-icould.com.caelynperiodtracker in
    # developer.apple.com → Identifiers → App Groups before building
    # with a provisioning profile. Automatic signing handles it once
    # the group exists in the portal.
    #
    # HealthKit: uncomment the healthkit lines below (both at once) if
    # enabling HealthKit. The App Group entitlement must stay uncommented
    # regardless of HealthKit status because WidgetKit requires it.
    entitlements:
      path: Caelyn/Caelyn.entitlements
      properties:
        com.apple.security.application-groups:
          - group.smallpanta-icould.com.caelynperiodtracker
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.smallpanta-icould.com.caelynperiodtracker
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.usernotifications.time-sensitive: true
    dependencies:
      - target: CaelynWidget
        embed: true
      - target: CaelynWatch
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: smallpanta-icould.com.caelynperiodtracker
        DEVELOPMENT_ASSET_PATHS: '"Caelyn/Preview Content"'
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: "Caelyn"
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Caelyn uses Face ID to keep your cycle data private."
        # HealthKit usage strings — required even when the entitlement is OFF,
        # because the binary still contains references to HealthKit APIs in
        # Services/. Apple's static analyzer rejects uploads (ITMS-90683)
        # without these strings. Re-comment these only if all HealthKit
        # symbols are removed from the binary.
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Caelyn reads your menstrual flow and symptoms from Apple Health to keep your cycle data in sync."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Caelyn writes your menstrual flow and symptoms to Apple Health when you choose to."
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"

  CaelynTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CaelynTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: smallpanta-icould.com.caelynperiodtracker.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Caelyn.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Caelyn"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Caelyn

  CaelynUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CaelynUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: smallpanta-icould.com.caelynperiodtracker.uitests
        TEST_TARGET_NAME: Caelyn
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Caelyn

  CaelynWidget:
    type: app-extension
    platform: iOS
    # Sources: all files in CaelynWidget/ plus the shared WidgetDataStore
    # (pure Foundation — no SwiftData/PredictionEngine/etc.).
    sources:
      - path: CaelynWidget
      - path: Caelyn/Services/WidgetDataStore.swift
    info:
      path: CaelynWidget/Info.plist
      properties:
        CFBundleDisplayName: CaelynWidget
        CFBundleVersion: "3"
        CFBundleShortVersionString: "1.0.1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: CaelynWidget/CaelynWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.smallpanta-icould.com.caelynperiodtracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: smallpanta-icould.com.caelynperiodtracker.widget
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: "7T9897GFKH"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_VERSION: "5.0"

  CaelynWatch:
    type: application
    platform: watchOS
    deploymentTarget:
      watchOS: "10.0"
    sources:
      - path: CaelynWatch
      - path: Caelyn/Services/WidgetDataStore.swift
    info:
      path: CaelynWatch/Info.plist
      properties:
        CFBundleDisplayName: Caelyn
        CFBundleVersion: "3"
        CFBundleShortVersionString: "1.0.1"
        WKApplication: true
        WKCompanionAppBundleIdentifier: smallpanta-icould.com.caelynperiodtracker
    entitlements:
      path: CaelynWatch/CaelynWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.smallpanta-icould.com.caelynperiodtracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: smallpanta-icould.com.caelynperiodtracker.watchapp
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: "7T9897GFKH"
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "4"

schemes:
  Caelyn:
    build:
      targets:
        Caelyn: all
        CaelynWidget: all
        CaelynWatch: all
        CaelynTests: [test]
        CaelynUITests: [test]
    test:
      config: Debug
      targets:
        - CaelynTests
        - CaelynUITests
    run:
      config: Debug
      # The .storekit lives at the project root, OUTSIDE the source path,
      # so it is NOT bundled into Release/TestFlight builds. It is used only
      # when running locally from Xcode against the Simulator. Release and
      # TestFlight always talk to real App Store / Sandbox StoreKit.
      storeKitConfiguration: Caelyn.storekit
    archive:
      config: Release
