name: Mavie
options:
  bundleIdPrefix: com.mavie
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""

targets:
  Mavie:
    type: application
    platform: iOS
    sources:
      - path: Mavie
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mavie.Mavie
        DEVELOPMENT_ASSET_PATHS: '"Mavie/Preview Content"'
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_EMIT_LOC_STRINGS: YES

  MavieTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MavieTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mavie.MavieTests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Mavie.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Mavie"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Mavie

  MavieUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MavieUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mavie.MavieUITests
        TEST_TARGET_NAME: Mavie
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Mavie

schemes:
  Mavie:
    build:
      targets:
        Mavie: all
        MavieTests: [test]
        MavieUITests: [test]
    test:
      config: Debug
      targets:
        - MavieTests
        - MavieUITests
    run:
      config: Debug
    archive:
      config: Release
